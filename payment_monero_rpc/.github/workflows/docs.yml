name: Build and Deploy Docs

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-js sphinx-rtd-theme

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm install --no-save jsdoc

      - name: Build Sphinx documentation (all languages)
        working-directory: ./docs
        run: |
          rm -rf _build
          mkdir -p _build/jsdoc
          sphinx-apidoc -f -o . ..
          npx jsdoc ../static/src/js/payment_form_monero_es6.js ../static/src/js/payment_monero_checkout.js -d _build/jsdoc
          sphinx-build -b html . _build/html || exit 1
          for lang in en es fr de zh_CN ar pt ru; do
            echo "Building documentation for language: $lang"
            sphinx-build -b html -D language=$lang . _build/html/$lang || exit 1
          done

      - name: Upload HTML docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-docs-html
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          publish_branch: gh-pages

